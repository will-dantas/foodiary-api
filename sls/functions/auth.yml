signUp:
  handler: src/main/functions/auth/signUp.handler
  events:
  - httpApi:
      path: /auth/sign-up
      method: POST

signIn:
  handler: src/main/functions/auth/signIn.handler
  events:
  - httpApi:
      path: /auth/sign-in
      method: POST

preSignUpTrigger:
  handler: src/main/functions/auth/preSignUpTrigger.handler
  events:
    - cognitoUserPool:
        pool: ${self:custom.cognito.PollName}
        trigger: PreSignUp
        existing: true
        forceDeploy: true

# The trigger is configured mananually to support event V2
# See UserPool.yml for configuration
# Do not change this function name, it is referenced in the UserPool.yml file
preTokenGenerationTrigger:
  handler: src/main/functions/auth/preTokenGenerationTrigger.handler